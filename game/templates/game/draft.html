<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giddey – Draft</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #c45e20;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #1a1a1a;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #e8883a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #ccc;
        }

        .score-box {
            background: #333;
            border-radius: 6px;
            padding: 0.4rem 0.75rem;
            text-align: center;
            min-width: 50px;
        }

        .score-box .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .score-box .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.05em;
        }

        /* ── Court ── */
        .court {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
            gap: 0.5rem;
            background: linear-gradient(180deg, #c45e20 0%, #a84e18 50%, #c45e20 100%);
            position: relative;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
        }

        .row-1 { gap: 5rem; }
        .row-2 { gap: 0.5rem; }
        .row-3 { gap: 12rem; }
        .row-4 { gap: 0; }

        /* ── Hex Slot ── */
        .hex-slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .hex-slot {
            width: 82px;
            height: 115px;
            clip-path: polygon(50% 0%, 100% 15%, 100% 85%, 50% 100%, 0% 85%, 0% 15%);
            background: #7a3a10;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.2s;
            cursor: default;
        }

        .hex-slot .empty-label {
            font-size: 1.8rem;
            font-weight: 900;
            color: rgba(255,255,255,0.15);
            text-transform: uppercase;
            user-select: none;
        }

        .hex-slot.dragover {
            background: #9a5520;
        }

        .hex-slot.dragover-invalid {
            background: #5a1a1a;
        }

        html.is-dragging, html.is-dragging * {
            cursor: grabbing !important;
        }

        .hex-slot.filled {
            padding: 0;
        }

        .hex-slot.filled .empty-label {
            display: none;
        }

        .slot-position-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── Tier color definitions ── */
        .tier-platinum {
            --border-light: #e0c0ff;
            --border-dark: #7c3aed;
            --upper-bg: #5b21b6;
            --lower-bg: #1e0a3e;
            --divider-color: #9056d0;
            --badge-bg: #9333ea;
        }
        .tier-gold {
            --border-light: #ffe066;
            --border-dark: #a07010;
            --upper-bg: #8a6010;
            --lower-bg: #352408;
            --divider-color: #b8920b;
            --badge-bg: #c49000;
        }
        .tier-silver {
            --border-light: #d8d8d8;
            --border-dark: #707070;
            --upper-bg: #585858;
            --lower-bg: #222222;
            --divider-color: #808080;
            --badge-bg: #808890;
        }
        .tier-bronze {
            --border-light: #e0a060;
            --border-dark: #6b3a12;
            --upper-bg: #6b3a12;
            --lower-bg: #241008;
            --divider-color: #8b5a2a;
            --badge-bg: #a06028;
        }

        /* ── Card structure (shared between pool and slot) ── */
        .card-inner {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            clip-path: polygon(50% 0%, 100% 15%, 100% 85%, 50% 100%, 0% 85%, 0% 15%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            filter: drop-shadow(0 3px 8px rgba(0,0,0,0.7));
        }

        .card-upper {
            flex: 50;
            background: var(--upper-bg);
            position: relative;
            overflow: hidden;
        }

        .card-upper .team-logo-bg {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 42%;
            height: 55%;
            object-fit: contain;
            opacity: 1;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .card-upper .player-photo {
            position: absolute;
            right: 2%;
            bottom: 0;
            width: 58%;
            height: 88%;
            object-fit: cover;
            object-position: top center;
            z-index: 1;
            filter: drop-shadow(-3px 2px 6px rgba(0,0,0,0.6));
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .card-badge-row {
            height: 1px;
            background: var(--divider-color);
            position: relative;
            z-index: 3;
            box-shadow: 0 0 6px rgba(0,0,0,0.6);
        }

        .card-badge-row .position-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.5rem;
            font-weight: 800;
            color: #fff;
            background: var(--badge-bg);
            padding: 3px 12px;
            clip-path: polygon(12% 0%, 88% 0%, 100% 50%, 88% 100%, 12% 100%, 0% 50%);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            z-index: 4;
        }

        .card-lower {
            flex: 50;
            background: var(--lower-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 1px 1px;
            gap: 0;
        }

        .card-lower .player-name {
            font-size: 0.6rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .card-lower .player-division {
            font-size: 0.45rem;
            color: rgba(255,255,255,0.75);
            text-transform: uppercase;
            margin-top: 1px;
        }

        .card-lower .player-year {
            font-size: 0.75rem;
            font-weight: 900;
            color: #fff;
            margin-top: 1px;
        }

        .card-lower .stars {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1px;
            margin-top: 2px;
        }

        .card-lower .stars .star {
            font-size: 0.5rem;
            color: #facc15;
            line-height: 1;
            display: block;
        }

        .card-lower .stars .star:nth-child(1) { margin-bottom: 4px; }
        .card-lower .stars .star:nth-child(2) { margin-bottom: 2px; }
        .card-lower .stars .star:nth-child(3) { margin-bottom: 0; }
        .card-lower .stars .star:nth-child(4) { margin-bottom: 2px; }
        .card-lower .stars .star:nth-child(5) { margin-bottom: 4px; }

        /* ── Slot card sizing ── */
        .card-in-slot {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, var(--border-light) 0%, var(--border-dark) 50%, var(--border-light) 100%);
            user-select: none;
            -webkit-user-select: none;
        }

        .card-in-slot .card-inner {
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
        }

        .card-in-slot .card-badge-row .position-badge {
            font-size: 0.42rem;
            padding: 1px 5px;
        }

        .card-in-slot .card-lower {
            padding: 5px 3px 1px;
        }

        .card-in-slot .card-lower .player-name {
            font-size: 0.5rem;
        }

        .card-in-slot .card-lower .player-division {
            font-size: 0.35rem;
        }

        .card-in-slot .card-lower .player-year {
            font-size: 0.55rem;
        }

        .card-in-slot .card-lower .stars .star {
            font-size: 0.38rem;
        }

        .card-in-slot .card-lower .stars .star:nth-child(1) { margin-bottom: 3px; }
        .card-in-slot .card-lower .stars .star:nth-child(2) { margin-bottom: 1px; }
        .card-in-slot .card-lower .stars .star:nth-child(3) { margin-bottom: 0; }
        .card-in-slot .card-lower .stars .star:nth-child(4) { margin-bottom: 1px; }
        .card-in-slot .card-lower .stars .star:nth-child(5) { margin-bottom: 3px; }

        /* ── Draft Area (bottom) ── */
        .draft-area {
            background: #1a1a1a;
            padding: 1rem 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            border-top: 3px solid #333;
        }

        .round-indicator {
            font-size: 0.9rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .draft-pool {
            display: flex;
            justify-content: center;
            gap: 1rem;
            min-height: 150px;
            align-items: center;
        }

        /* ── Pool Card ── */
        .pool-card {
            width: 105px;
            height: 148px;
            clip-path: polygon(50% 0%, 100% 15%, 100% 85%, 50% 100%, 0% 85%, 0% 15%);
            background: linear-gradient(135deg, var(--border-light) 0%, var(--border-dark) 50%, var(--border-light) 100%);
            position: relative;
            cursor: grab;
            transition: transform 0.15s, opacity 0.3s;
            user-select: none;
            -webkit-user-select: none;
        }

        .pool-card:hover {
            transform: scale(1.05);
        }

        .pool-card:active {
            cursor: grabbing;
        }

        .pool-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .pool-card.dragging {
            visibility: hidden;
        }

        .pool-card .card-lower .player-name {
            font-size: 0.75rem;
        }

        .pool-card .card-lower .player-year {
            font-size: 0.8rem;
        }

        .pool-card .card-lower .stars .star {
            font-size: 0.55rem;
        }

        .pool-card .card-lower .stars .star:nth-child(1) { margin-bottom: 5px; }
        .pool-card .card-lower .stars .star:nth-child(2) { margin-bottom: 2px; }
        .pool-card .card-lower .stars .star:nth-child(3) { margin-bottom: 0; }
        .pool-card .card-lower .stars .star:nth-child(4) { margin-bottom: 2px; }
        .pool-card .card-lower .stars .star:nth-child(5) { margin-bottom: 5px; }

        /* ── Next Round Button ── */
        .next-round-btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 0.75rem 3rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 80%;
            max-width: 400px;
        }

        .next-round-btn:hover {
            background: #555;
        }

        .next-round-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Draft complete overlay ── */
        .draft-complete {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        .draft-complete.show {
            display: flex;
        }

        .draft-complete h2 {
            font-size: 2rem;
            color: #e8883a;
            font-weight: 900;
            letter-spacing: 0.1em;
        }

        .draft-complete .final-score {
            font-size: 1.2rem;
            color: #fff;
        }

        .draft-complete button {
            background: #e8883a;
            color: #1a1a1a;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-title">Giddey</div>
        <div class="header-right">
            <div class="score-box">
                <div class="value" id="talent-score">0</div>
                <div class="label">Talent</div>
            </div>
            <div class="score-box">
                <div class="value" id="chem-score">0</div>
                <div class="label">Chem</div>
            </div>
            <div class="score-box">
                <div class="value" id="total-score">0</div>
                <div class="label">Total</div>
            </div>
        </div>
    </div>

    <!-- Court Grid -->
    <div class="court">
        <!-- Row 1: SG, PF -->
        <div class="row row-1">
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="0" data-position="SG"></div>
                <div class="slot-position-label">SG</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="1" data-position="PF"></div>
                <div class="slot-position-label">PF</div>
            </div>
        </div>
        <!-- Row 2: SF, PG, PG, SF -->
        <div class="row row-2">
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="2" data-position="SF"></div>
                <div class="slot-position-label">SF</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="3" data-position="PG"></div>
                <div class="slot-position-label">PG</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="4" data-position="PG"></div>
                <div class="slot-position-label">PG</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="5" data-position="SF"></div>
                <div class="slot-position-label">SF</div>
            </div>
        </div>
        <!-- Row 3: PF, SG -->
        <div class="row row-3">
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="6" data-position="PF"></div>
                <div class="slot-position-label">PF</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="7" data-position="SG"></div>
                <div class="slot-position-label">SG</div>
            </div>
        </div>
        <!-- Row 4: C -->
        <div class="row row-4">
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="8" data-position="C"></div>
                <div class="slot-position-label">C</div>
            </div>
        </div>
    </div>

    <!-- Draft Area -->
    <div class="draft-area">
        <div class="round-indicator" id="round-indicator">Round 1 of 9</div>
        <div class="draft-pool" id="draft-pool"></div>
        <button class="next-round-btn" id="next-round-btn" onclick="nextRound()">Next Round</button>
    </div>

    <!-- Draft Complete Overlay -->
    <div class="draft-complete" id="draft-complete">
        <h2>DRAFT COMPLETE</h2>
        <div class="final-score" id="final-score"></div>
        <button onclick="window.location.reload()">Draft Again</button>
    </div>

<script>
    let currentRound = 1;
    const totalRounds = 9;
    let draftedPlayerIds = [];
    let draftedSlots = {};
    let currentPool = [];
    let pickedThisRound = false;

    function getTier(rating) {
        if (rating >= 88) return 'platinum';
        if (rating >= 82) return 'gold';
        if (rating >= 76) return 'silver';
        return 'bronze';
    }

    function getTalentBonus(rating) {
        if (rating >= 88) return 11;
        if (rating >= 82) return 8;
        if (rating >= 76) return 5;
        return 3;
    }

    function getStars(rating) {
        if (rating >= 88) return 4;
        if (rating >= 82) return 3;
        if (rating >= 76) return 2;
        return 1;
    }

    function starString(count) {
        let html = '';
        for (let i = 0; i < 5; i++) {
            const filled = i < count;
            html += `<span class="star">${filled ? '★' : '☆'}</span>`;
        }
        return html;
    }

    function buildCardHTML(player, isSlot) {
        const tier = getTier(player.rating);
        const tierClass = 'tier-' + tier;
        const initial = player.first_name.charAt(0).toUpperCase();
        const lastName = player.last_name.toUpperCase();
        const stars = getStars(player.rating);

        return `
            <div class="${isSlot ? 'card-in-slot' : ''} ${tierClass}">
                <div class="card-inner">
                    <div class="card-upper">
                        <img class="team-logo-bg" src="${player.team_logo}" alt="" onerror="this.style.display='none'">
                        <img class="player-photo" src="${player.image}" alt="${player.first_name} ${player.last_name}" onerror="this.style.display='none'">
                    </div>
                    <div class="card-badge-row">
                        <div class="position-badge">${player.position}</div>
                    </div>
                    <div class="card-lower">
                        <div class="player-name">${initial}. ${lastName}</div>
                        <div class="player-division">${player.team_division}</div>
                        <div class="player-year">${player.draft_year}</div>
                        <div class="stars">${starString(stars)}</div>
                    </div>
                </div>
            </div>
        `;
    }

    async function fetchPlayers() {
        const exclude = draftedPlayerIds.join(',');
        const resp = await fetch('/api/random-players/?exclude=' + exclude);
        currentPool = await resp.json();
        renderPool();
    }

    function renderPool() {
        const pool = document.getElementById('draft-pool');
        pool.innerHTML = '';
        pickedThisRound = false;

        currentPool.forEach((player, index) => {
            const card = document.createElement('div');
            card.className = 'pool-card tier-' + getTier(player.rating);
            card.dataset.index = index;
            card.innerHTML = buildCardHTML(player, false);

            // Mouse drag
            card.addEventListener('mousedown', (e) => handleDragStart(e, card, index));
            // Touch drag
            card.addEventListener('touchstart', (e) => handleDragStart(e, card, index), { passive: false });

            pool.appendChild(card);
        });
    }

    // ── Unified drag support (mouse + touch) ──
    let dragData = null;
    let dragEl = null;
    let dragClone = null;
    let dragSourceSlot = null; // track if dragging from a grid slot

    function playerMatchesSlot(player, slot) {
        const slotPos = slot.dataset.position;
        const playerPositions = player.position.split('/').map(p => p.trim());
        return playerPositions.includes(slotPos);
    }

    function getPointer(e) {
        if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
    }

    function getEndPointer(e) {
        if (e.changedTouches) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        return { x: e.clientX, y: e.clientY };
    }

    function handleDragStart(e, card, index) {
        if (pickedThisRound) return;
        e.preventDefault();

        dragData = currentPool[index];
        dragEl = card;
        dragSourceSlot = null;

        startDragVisual(e, card);
    }

    function handleSlotDragStart(e, slot) {
        e.preventDefault();
        const slotIndex = slot.dataset.slot;
        if (!draftedSlots[slotIndex]) return;

        dragData = draftedSlots[slotIndex];
        dragEl = slot;
        dragSourceSlot = slot;

        startDragVisual(e, slot);
    }

    function startDragVisual(e, el) {
        const pos = getPointer(e);

        dragClone = el.cloneNode(true);
        dragClone.style.position = 'fixed';
        dragClone.style.zIndex = '999';
        dragClone.style.pointerEvents = 'none';
        dragClone.style.opacity = '0.85';
        dragClone.style.width = el.offsetWidth + 'px';
        dragClone.style.height = el.offsetHeight + 'px';
        dragClone.style.left = (pos.x - el.offsetWidth / 2) + 'px';
        dragClone.style.top = (pos.y - el.offsetHeight / 2) + 'px';
        dragClone.style.transition = 'none';
        document.body.appendChild(dragClone);

        el.classList.add('dragging');
        document.documentElement.classList.add('is-dragging');

        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchmove', handleDragMove, { passive: false });
        document.addEventListener('touchend', handleDragEnd, { passive: false });
    }

    function handleDragMove(e) {
        if (!dragClone) return;
        e.preventDefault();
        const pos = getPointer(e);
        dragClone.style.left = (pos.x - dragClone.offsetWidth / 2) + 'px';
        dragClone.style.top = (pos.y - dragClone.offsetHeight / 2) + 'px';

        document.querySelectorAll('.hex-slot').forEach(s => {
            s.classList.remove('dragover');
            s.classList.remove('dragover-invalid');
        });
        dragClone.style.display = 'none';
        const el = document.elementFromPoint(pos.x, pos.y);
        dragClone.style.display = '';
        if (el) {
            const slot = el.closest('.hex-slot');
            if (slot && slot !== dragSourceSlot && dragData) {
                if (playerMatchesSlot(dragData, slot)) {
                    // For swaps, also check the other direction
                    const targetIndex = slot.dataset.slot;
                    const targetPlayer = draftedSlots[targetIndex];
                    if (dragSourceSlot && targetPlayer && !playerMatchesSlot(targetPlayer, dragSourceSlot)) {
                        slot.classList.add('dragover-invalid');
                    } else {
                        slot.classList.add('dragover');
                    }
                } else {
                    slot.classList.add('dragover-invalid');
                }
            }
        }
    }

    function handleDragEnd(e) {
        if (!dragClone || !dragData) {
            cleanupDrag();
            return;
        }

        const pos = getEndPointer(e);
        dragClone.style.display = 'none';
        const el = document.elementFromPoint(pos.x, pos.y);
        dragClone.style.display = '';

        if (el) {
            const targetSlot = el.closest('.hex-slot');
            if (targetSlot && targetSlot !== dragSourceSlot && playerMatchesSlot(dragData, targetSlot)) {
                if (dragSourceSlot) {
                    // Moving from one slot to another — swap
                    const sourceIndex = dragSourceSlot.dataset.slot;
                    const targetIndex = targetSlot.dataset.slot;
                    const targetPlayer = draftedSlots[targetIndex] || null;

                    // If swapping, the target player must also fit the source slot
                    if (targetPlayer && !playerMatchesSlot(targetPlayer, dragSourceSlot)) {
                        // Invalid swap — do nothing
                    } else {
                        // Place dragged player in target
                        draftedSlots[targetIndex] = dragData;
                        targetSlot.innerHTML = buildCardHTML(dragData, true);
                        targetSlot.classList.add('filled');
                        makeSlotDraggable(targetSlot);

                        // Place target player in source (or clear it)
                        if (targetPlayer) {
                            draftedSlots[sourceIndex] = targetPlayer;
                            dragSourceSlot.innerHTML = buildCardHTML(targetPlayer, true);
                            dragSourceSlot.classList.add('filled');
                            makeSlotDraggable(dragSourceSlot);
                        } else {
                            delete draftedSlots[sourceIndex];
                            const label = document.createElement('span');
                            label.className = 'empty-label';
                            label.textContent = 'G';
                            dragSourceSlot.innerHTML = '';
                            dragSourceSlot.appendChild(label);
                            dragSourceSlot.classList.remove('filled');
                        }
                    }
                } else if (!targetSlot.classList.contains('filled')) {
                    // Dragging from pool to empty slot
                    placeCard(targetSlot, dragData);
                }
            }
        }

        document.querySelectorAll('.hex-slot').forEach(s => {
            s.classList.remove('dragover');
            s.classList.remove('dragover-invalid');
        });
        cleanupDrag();
    }

    function cleanupDrag() {
        if (dragClone && dragClone.parentNode) dragClone.parentNode.removeChild(dragClone);
        if (dragEl) dragEl.classList.remove('dragging');
        document.documentElement.classList.remove('is-dragging');
        dragData = null;
        dragEl = null;
        dragClone = null;
        dragSourceSlot = null;
        document.removeEventListener('mousemove', handleDragMove);
        document.removeEventListener('mouseup', handleDragEnd);
        document.removeEventListener('touchmove', handleDragMove);
        document.removeEventListener('touchend', handleDragEnd);
    }

    // ── Make a filled slot draggable ──
    function makeSlotDraggable(slot) {
        slot.style.cursor = 'grab';
        // Remove old listeners by replacing the node (clean way)
        const handler = (e) => handleSlotDragStart(e, slot);
        slot.onmousedown = handler;
        slot.ontouchstart = handler;
    }

    // ── Drop zones ──
    function setupDropZones() {
        document.querySelectorAll('.hex-slot').forEach(slot => {
            const label = document.createElement('span');
            label.className = 'empty-label';
            label.textContent = 'G';
            slot.appendChild(label);
        });
    }

    function placeCard(slot, player) {
        if (pickedThisRound || slot.classList.contains('filled')) return;

        const slotIndex = slot.dataset.slot;
        draftedSlots[slotIndex] = player;
        draftedPlayerIds.push(player.id);
        pickedThisRound = true;

        slot.innerHTML = buildCardHTML(player, true);
        slot.classList.add('filled');
        makeSlotDraggable(slot);

        document.querySelectorAll('.pool-card').forEach(card => {
            card.classList.add('disabled');
        });
        if (dragEl) dragEl.style.visibility = 'hidden';

        updateScore();
    }

    function updateScore() {
        let talent = 0;
        for (const key in draftedSlots) {
            talent += getTalentBonus(draftedSlots[key].rating);
        }
        document.getElementById('talent-score').textContent = talent;
        document.getElementById('total-score').textContent = talent;
    }

    function nextRound() {
        if (!pickedThisRound) return;

        if (currentRound >= totalRounds) {
            const overlay = document.getElementById('draft-complete');
            const talent = document.getElementById('talent-score').textContent;
            document.getElementById('final-score').textContent = 'Total Talent: ' + talent;
            overlay.classList.add('show');
            return;
        }

        currentRound++;
        document.getElementById('round-indicator').textContent =
            'Round ' + currentRound + ' of ' + totalRounds;
        fetchPlayers();
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
        setupDropZones();
        fetchPlayers();
    });
</script>

</body>
</html>
