<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giddey – Draft</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #c45e20;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #1a1a1a;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #e8883a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #ccc;
        }

        .score-box {
            background: #333;
            border-radius: 6px;
            padding: 0.4rem 0.75rem;
            text-align: center;
            min-width: 50px;
        }

        .score-box .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .score-box .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.05em;
        }

        /* ── Court ── */
        .court {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
            gap: 0.5rem;
            background: linear-gradient(180deg, #c45e20 0%, #a84e18 50%, #c45e20 100%);
            position: relative;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
        }

        .row-1 { gap: 5rem; }
        .row-2 { gap: 0.5rem; }
        .row-3 { gap: 12rem; }
        .row-4 { gap: 0; }

        /* ── Hex Slot ── */
        .hex-slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .hex-slot {
            width: 100px;
            height: 150px;
            clip-path: polygon(50% 0%, 100% 20%, 100% 80%, 50% 100%, 0% 80%, 0% 20%);
            background: #7a3a10;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.2s;
            cursor: default;
        }

        .hex-slot .empty-label {
            font-size: 1.8rem;
            font-weight: 900;
            color: rgba(255,255,255,0.15);
            text-transform: uppercase;
            user-select: none;
        }

        .hex-slot.dragover {
            background: #9a5520;
        }

        .hex-slot.filled .empty-label {
            display: none;
        }

        .slot-position-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── Player Card (in slot) ── */
        .card-in-slot {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 20%, 100% 80%, 50% 100%, 0% 80%, 0% 20%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 0.3rem;
        }

        .card-in-slot .team-logo-bg {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            object-fit: contain;
            opacity: 0.25;
            pointer-events: none;
        }

        .card-in-slot .player-photo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 1;
            margin-top: 8px;
        }

        .card-in-slot .position-badge {
            font-size: 0.5rem;
            font-weight: 800;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 1px 6px;
            border-radius: 3px;
            position: relative;
            z-index: 1;
            margin-top: 2px;
        }

        .card-in-slot .player-name {
            font-size: 0.55rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
            position: relative;
            z-index: 1;
            margin-top: 2px;
            line-height: 1.1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .card-in-slot .player-division {
            font-size: 0.45rem;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .card-in-slot .player-year {
            font-size: 0.55rem;
            font-weight: 800;
            color: #fff;
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Tier backgrounds */
        .tier-platinum { background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899); }
        .tier-gold { background: linear-gradient(135deg, #b8860b, #f59e0b, #d97706); }
        .tier-silver { background: linear-gradient(135deg, #6b7280, #9ca3af, #6b7280); }
        .tier-bronze { background: linear-gradient(135deg, #92400e, #b45309, #78350f); }

        /* ── Draft Area (bottom) ── */
        .draft-area {
            background: #1a1a1a;
            padding: 1rem 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            border-top: 3px solid #333;
        }

        .round-indicator {
            font-size: 0.9rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .draft-pool {
            display: flex;
            justify-content: center;
            gap: 1rem;
            min-height: 160px;
            align-items: center;
        }

        /* ── Pool Card ── */
        .pool-card {
            width: 120px;
            height: 165px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: grab;
            transition: transform 0.15s, opacity 0.3s;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .pool-card:hover {
            transform: scale(1.05);
        }

        .pool-card:active {
            cursor: grabbing;
        }

        .pool-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .pool-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .pool-card .team-logo-bg {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 65px;
            object-fit: contain;
            opacity: 0.2;
            pointer-events: none;
        }

        .pool-card .player-photo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
            position: relative;
            z-index: 1;
            margin-top: 10px;
        }

        .pool-card .position-badge {
            font-size: 0.6rem;
            font-weight: 800;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 3px;
            position: relative;
            z-index: 1;
            margin-top: 4px;
        }

        .pool-card .player-name {
            font-size: 0.7rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            text-align: center;
            position: relative;
            z-index: 1;
            margin-top: 4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .pool-card .player-division {
            font-size: 0.55rem;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .pool-card .player-year {
            font-size: 0.7rem;
            font-weight: 800;
            color: #fff;
            position: relative;
            z-index: 1;
            margin-top: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .pool-card .stars {
            font-size: 0.5rem;
            color: #facc15;
            position: relative;
            z-index: 1;
            margin-top: 2px;
        }

        .card-in-slot .stars {
            font-size: 0.4rem;
            color: #facc15;
            position: relative;
            z-index: 1;
            margin-top: 1px;
        }

        /* ── Next Round Button ── */
        .next-round-btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 0.75rem 3rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 80%;
            max-width: 400px;
        }

        .next-round-btn:hover {
            background: #555;
        }

        .next-round-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Draft complete overlay ── */
        .draft-complete {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        .draft-complete.show {
            display: flex;
        }

        .draft-complete h2 {
            font-size: 2rem;
            color: #e8883a;
            font-weight: 900;
            letter-spacing: 0.1em;
        }

        .draft-complete .final-score {
            font-size: 1.2rem;
            color: #fff;
        }

        .draft-complete button {
            background: #e8883a;
            color: #1a1a1a;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-title">Giddey</div>
        <div class="header-right">
            <div class="score-box">
                <div class="value" id="talent-score">0</div>
                <div class="label">Talent</div>
            </div>
            <div class="score-box">
                <div class="value" id="chem-score">0</div>
                <div class="label">Chem</div>
            </div>
            <div class="score-box">
                <div class="value" id="total-score">0</div>
                <div class="label">Total</div>
            </div>
        </div>
    </div>

    <!-- Court Grid -->
    <div class="court">
        <!-- Row 1: SG, PF -->
        <div class="row row-1">
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="0" data-position="SG"></div>
                <div class="slot-position-label">SG</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="1" data-position="PF"></div>
                <div class="slot-position-label">PF</div>
            </div>
        </div>
        <!-- Row 2: SF, PG, PG, SF -->
        <div class="row row-2">
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="2" data-position="SF"></div>
                <div class="slot-position-label">SF</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="3" data-position="PG"></div>
                <div class="slot-position-label">PG</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="4" data-position="PG"></div>
                <div class="slot-position-label">PG</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="5" data-position="SF"></div>
                <div class="slot-position-label">SF</div>
            </div>
        </div>
        <!-- Row 3: PF, SG -->
        <div class="row row-3">
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="6" data-position="PF"></div>
                <div class="slot-position-label">PF</div>
            </div>
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="7" data-position="SG"></div>
                <div class="slot-position-label">SG</div>
            </div>
        </div>
        <!-- Row 4: C -->
        <div class="row row-4">
            <div class="hex-slot-wrapper">
                <div class="hex-slot" data-slot="8" data-position="C"></div>
                <div class="slot-position-label">C</div>
            </div>
        </div>
    </div>

    <!-- Draft Area -->
    <div class="draft-area">
        <div class="round-indicator" id="round-indicator">Round 1 of 9</div>
        <div class="draft-pool" id="draft-pool"></div>
        <button class="next-round-btn" id="next-round-btn" onclick="nextRound()">Next Round</button>
    </div>

    <!-- Draft Complete Overlay -->
    <div class="draft-complete" id="draft-complete">
        <h2>DRAFT COMPLETE</h2>
        <div class="final-score" id="final-score"></div>
        <button onclick="window.location.reload()">Draft Again</button>
    </div>

<script>
    let currentRound = 1;
    const totalRounds = 9;
    let draftedPlayerIds = [];
    let draftedSlots = {};
    let currentPool = [];
    let pickedThisRound = false;

    function getTier(rating) {
        if (rating >= 88) return 'platinum';
        if (rating >= 82) return 'gold';
        if (rating >= 76) return 'silver';
        return 'bronze';
    }

    function getTalentBonus(rating) {
        if (rating >= 88) return 11;
        if (rating >= 82) return 8;
        if (rating >= 76) return 5;
        return 3;
    }

    function getStars(rating) {
        if (rating >= 88) return 5;
        if (rating >= 82) return 4;
        if (rating >= 76) return 3;
        return 2;
    }

    function starString(count) {
        return '★'.repeat(count) + '☆'.repeat(5 - count);
    }

    function buildCardHTML(player, isSlot) {
        const tier = getTier(player.rating);
        const tierClass = 'tier-' + tier;
        const initial = player.first_name.charAt(0).toUpperCase();
        const lastName = player.last_name.toUpperCase();
        const stars = getStars(player.rating);

        return `
            <div class="${isSlot ? 'card-in-slot' : ''} ${tierClass}">
                <img class="team-logo-bg" src="${player.team_logo}" alt="" onerror="this.style.display='none'">
                <img class="player-photo" src="${player.image}" alt="${player.first_name} ${player.last_name}" onerror="this.style.display='none'">
                <div class="position-badge">${player.position}</div>
                <div class="player-name">${initial}. ${lastName}</div>
                <div class="player-division">${player.team_division}</div>
                <div class="player-year">${player.draft_year}</div>
                <div class="stars">${starString(stars)}</div>
            </div>
        `;
    }

    async function fetchPlayers() {
        const exclude = draftedPlayerIds.join(',');
        const resp = await fetch('/api/random-players/?exclude=' + exclude);
        currentPool = await resp.json();
        renderPool();
    }

    function renderPool() {
        const pool = document.getElementById('draft-pool');
        pool.innerHTML = '';
        pickedThisRound = false;

        currentPool.forEach((player, index) => {
            const card = document.createElement('div');
            card.className = 'pool-card tier-' + getTier(player.rating);
            card.draggable = true;
            card.dataset.index = index;
            card.innerHTML = buildCardHTML(player, false);

            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify(player));
                card.classList.add('dragging');
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
            });

            // Touch support
            card.addEventListener('touchstart', handleTouchStart, { passive: false });
            card.addEventListener('touchmove', handleTouchMove, { passive: false });
            card.addEventListener('touchend', handleTouchEnd, { passive: false });

            pool.appendChild(card);
        });
    }

    // ── Touch drag support ──
    let touchDragData = null;
    let touchDragEl = null;
    let touchClone = null;

    function handleTouchStart(e) {
        if (pickedThisRound) return;
        const card = e.currentTarget;
        const index = parseInt(card.dataset.index);
        touchDragData = currentPool[index];
        touchDragEl = card;

        // Create a visual clone that follows the finger
        touchClone = card.cloneNode(true);
        touchClone.style.position = 'fixed';
        touchClone.style.zIndex = '999';
        touchClone.style.pointerEvents = 'none';
        touchClone.style.opacity = '0.8';
        touchClone.style.width = card.offsetWidth + 'px';
        touchClone.style.height = card.offsetHeight + 'px';
        const touch = e.touches[0];
        touchClone.style.left = (touch.clientX - card.offsetWidth / 2) + 'px';
        touchClone.style.top = (touch.clientY - card.offsetHeight / 2) + 'px';
        document.body.appendChild(touchClone);

        card.classList.add('dragging');
        e.preventDefault();
    }

    function handleTouchMove(e) {
        if (!touchClone) return;
        const touch = e.touches[0];
        touchClone.style.left = (touch.clientX - touchClone.offsetWidth / 2) + 'px';
        touchClone.style.top = (touch.clientY - touchClone.offsetHeight / 2) + 'px';

        // Highlight slot under finger
        document.querySelectorAll('.hex-slot').forEach(s => s.classList.remove('dragover'));
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el) {
            const slot = el.closest('.hex-slot');
            if (slot && !slot.classList.contains('filled')) {
                slot.classList.add('dragover');
            }
        }
        e.preventDefault();
    }

    function handleTouchEnd(e) {
        if (!touchClone || !touchDragData) {
            cleanupTouch();
            return;
        }

        const touch = e.changedTouches[0];
        if (touchClone) touchClone.style.display = 'none';
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (touchClone) touchClone.style.display = '';

        if (el) {
            const slot = el.closest('.hex-slot');
            if (slot && !slot.classList.contains('filled')) {
                placeCard(slot, touchDragData);
            }
        }

        document.querySelectorAll('.hex-slot').forEach(s => s.classList.remove('dragover'));
        cleanupTouch();
    }

    function cleanupTouch() {
        if (touchClone && touchClone.parentNode) {
            touchClone.parentNode.removeChild(touchClone);
        }
        if (touchDragEl) touchDragEl.classList.remove('dragging');
        touchDragData = null;
        touchDragEl = null;
        touchClone = null;
    }

    // ── Drop zones ──
    function setupDropZones() {
        document.querySelectorAll('.hex-slot').forEach(slot => {
            // Show empty label
            const label = document.createElement('span');
            label.className = 'empty-label';
            label.textContent = 'G';
            slot.appendChild(label);

            slot.addEventListener('dragover', (e) => {
                if (slot.classList.contains('filled')) return;
                e.preventDefault();
                slot.classList.add('dragover');
            });

            slot.addEventListener('dragleave', () => {
                slot.classList.remove('dragover');
            });

            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('dragover');
                if (slot.classList.contains('filled')) return;
                if (pickedThisRound) return;

                const player = JSON.parse(e.dataTransfer.getData('text/plain'));
                placeCard(slot, player);
            });
        });
    }

    function placeCard(slot, player) {
        if (pickedThisRound || slot.classList.contains('filled')) return;

        const slotIndex = slot.dataset.slot;
        draftedSlots[slotIndex] = player;
        draftedPlayerIds.push(player.id);
        pickedThisRound = true;

        // Render card in slot
        slot.innerHTML = buildCardHTML(player, true);
        slot.classList.add('filled');

        // Disable remaining pool cards
        document.querySelectorAll('.pool-card').forEach(card => {
            card.classList.add('disabled');
            card.draggable = false;
        });

        updateScore();
    }

    function updateScore() {
        let talent = 0;
        for (const key in draftedSlots) {
            talent += getTalentBonus(draftedSlots[key].rating);
        }
        document.getElementById('talent-score').textContent = talent;
        document.getElementById('total-score').textContent = talent;
    }

    function nextRound() {
        if (!pickedThisRound) return;

        if (currentRound >= totalRounds) {
            // Draft complete
            const overlay = document.getElementById('draft-complete');
            const talent = document.getElementById('talent-score').textContent;
            document.getElementById('final-score').textContent = 'Total Talent: ' + talent;
            overlay.classList.add('show');
            return;
        }

        currentRound++;
        document.getElementById('round-indicator').textContent =
            'Round ' + currentRound + ' of ' + totalRounds;
        fetchPlayers();
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
        setupDropZones();
        fetchPlayers();
    });
</script>

</body>
</html>
