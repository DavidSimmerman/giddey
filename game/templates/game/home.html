<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giddey</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #c45e20;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #1a1a1a;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #e8883a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
        }

        .auth-links {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
        }

        .auth-links a {
            color: #aaa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-links a:hover {
            color: #e8883a;
        }

        .auth-links .username {
            color: #fff;
            font-weight: 700;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            gap: 1.5rem;
        }

        .start-btn {
            display: inline-block;
            padding: 0.75rem 3rem;
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
            background: #e8883a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }

        .start-btn:hover {
            background: #f09a4a;
        }

        .secondary-btn {
            display: inline-block;
            padding: 0.75rem 3rem;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            background: #444;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }

        .secondary-btn:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'home' %}" class="header-title">Giddey</a>
        <div class="auth-links">
            {% if user.is_authenticated %}
                <span class="username">{{ user.username }}</span>
                <a href="{% url 'friends' %}">Friends{% if pending_count %} ({{ pending_count }}){% endif %}</a>
                <a href="{% url 'history' %}">My Drafts</a>
                <a href="{% url 'logout' %}">Log Out</a>
            {% else %}
                <a href="{% url 'login' %}">Sign In</a>
            {% endif %}
        </div>
    </div>
    <div class="main">
        <a href="{% url 'draft' %}" class="start-btn">Start Draft</a>
        {% if user.is_authenticated %}
        <a href="{% url 'friends' %}" class="secondary-btn">Friends{% if pending_count %} ({{ pending_count }}){% endif %}</a>
        <a href="{% url 'history' %}" class="secondary-btn">My Drafts</a>
        {% endif %}
    </div>
</body>
</html>
