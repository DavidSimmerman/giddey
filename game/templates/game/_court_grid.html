<svg class="grid-lines" id="grid-lines"></svg>
<!-- Row 1: SG, PF (with spacers to align with PGs) -->
<div class="row row-1">
    <div class="hex-spacer"></div>
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="0" data-position="SG"><span class="empty-label">G</span></div>
        <div class="slot-position-label">SG</div>
    </div>
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="1" data-position="PF"><span class="empty-label">G</span></div>
        <div class="slot-position-label">PF</div>
    </div>
    <div class="hex-spacer"></div>
</div>
<!-- Row 2: SF, PG, PG, SF -->
<div class="row row-2">
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="2" data-position="SF"><span class="empty-label">G</span></div>
        <div class="slot-position-label">SF</div>
    </div>
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="3" data-position="PG"><span class="empty-label">G</span></div>
        <div class="slot-position-label">PG</div>
    </div>
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="4" data-position="PG"><span class="empty-label">G</span></div>
        <div class="slot-position-label">PG</div>
    </div>
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="5" data-position="SF"><span class="empty-label">G</span></div>
        <div class="slot-position-label">SF</div>
    </div>
</div>
<!-- Row 3: PF, SG -->
<div class="row row-3">
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="6" data-position="PF"><span class="empty-label">G</span></div>
        <div class="slot-position-label">PF</div>
    </div>
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="7" data-position="SG"><span class="empty-label">G</span></div>
        <div class="slot-position-label">SG</div>
    </div>
</div>
<!-- Row 4: C -->
<div class="row row-4">
    <div class="hex-slot-wrapper">
        <div class="hex-slot" data-slot="8" data-position="C"><span class="empty-label">G</span></div>
        <div class="slot-position-label">C</div>
    </div>
</div>
