<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giddey – Link Expired</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #111;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #e8883a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        .message {
            font-size: 1rem;
            color: #999;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #e8883a;
            color: #111;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn:hover { background: #f09a4a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Giddey</div>
        <div class="message">This challenge link is no longer available. It may have already been accepted or expired.</div>
        <a href="/" class="btn">Go Home</a>
    </div>
</body>
</html>
