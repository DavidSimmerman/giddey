<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giddey – Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #c45e20;
            color: #e0e0e0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #1a1a1a;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #e8883a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 380px;
        }

        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            cursor: pointer;
            color: #888;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.2s, background 0.2s;
            border: none;
            background: transparent;
        }

        .tab.active {
            color: #1a1a1a;
            background: #e8883a;
        }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .field {
            margin-bottom: 1rem;
        }

        .field label {
            display: block;
            font-size: 0.8rem;
            color: #1a1a1a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .field input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
        }

        .field input:focus {
            outline: none;
            border-color: #e8883a;
        }

        .error {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.4);
            color: #ffe0e0;
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a1a;
            background: #e8883a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .submit-btn:hover {
            background: #f09a4a;
        }

        .guest-link {
            display: block;
            width: 100%;
            text-align: center;
            margin-top: 0.75rem;
            padding: 0.75rem;
            color: #fff;
            background: #444;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .guest-link:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'home' %}" class="header-title">Giddey</a>
    </div>

    <div class="main">
        <div class="container">
            <div class="tabs">
                <div class="tab{% if tab == 'login' %} active{% endif %}" data-tab="login">Sign In</div>
                <div class="tab{% if tab == 'register' %} active{% endif %}" data-tab="register">Create Account</div>
            </div>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form class="form-panel{% if tab == 'login' %} active{% endif %}" id="panel-login" method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="action" value="login">
                <div class="field">
                    <label for="login-user">Username</label>
                    <input id="login-user" type="text" name="username" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="login-pass">Password</label>
                    <input id="login-pass" type="password" name="password" autocomplete="current-password" required>
                </div>
                <button class="submit-btn" type="submit">Sign In</button>
            </form>

            <form class="form-panel{% if tab == 'register' %} active{% endif %}" id="panel-register" method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="hidden" name="action" value="register">
                <div class="field">
                    <label for="reg-user">Username</label>
                    <input id="reg-user" type="text" name="username" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="reg-pass">Password</label>
                    <input id="reg-pass" type="password" name="password" autocomplete="new-password" required>
                </div>
                <div class="field">
                    <label for="reg-pass2">Confirm Password</label>
                    <input id="reg-pass2" type="password" name="password2" autocomplete="new-password" required>
                </div>
                <button class="submit-btn" type="submit">Create Account</button>
            </form>

            <a href="{% url 'guest' %}" class="guest-link">Play as Guest</a>
        </div>
    </div>

    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
                const err = document.querySelector('.error');
                if (err) err.remove();
            });
        });
    </script>
</body>
</html>
